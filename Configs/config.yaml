data:
  train_path: "/media/francesco/STORAGE/Coll_2V_VBFHbb_preliminary_prove/Train"
  val_path: "/media/francesco/STORAGE/Coll_2V_VBFHbb_preliminary_prove/Val"
  test_path: "/media/francesco/STORAGE/Coll_2V_VBFHbb_preliminary_prove/Test"
  max_part: 128
  preprocessing: True
  features: 
    - L1T_PUPPIPart_Eta 
    - L1T_PUPPIPart_Phi
    - L1T_PUPPIPart_PT
    - L1T_PUPPIPart_PID
    - L1T_PUPPIPart_PuppiW
  jet_features:
    - L1T_JetPuppiAK4_PT
    - L1T_JetPuppiAK4_Eta
    - L1T_JetPuppiAK4_Phi
    - L1T_JetPuppiAK4_Mass
    - L1T_JetPuppiAK8_PT
    - L1T_JetPuppiAK8_Eta
    - L1T_JetPuppiAK8_Phi
    - L1T_JetPuppiAK8_Mass

MLP_VQVAE:
  input_dim: 3
  hidden_dim: 128
  latent_dim: 256
  codebook_size: 256
  rotation_trick: true
  decay: 0.8
  beta: 0.25

training:
  lr: 0.001
  max_epochs: 2
  batch_size: 32